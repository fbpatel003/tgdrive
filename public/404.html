<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <script>
    // GitHub Pages SPA 404 redirect.
    // URL is e.g. https://fbpatel003.github.io/tgdrive/drive/123
    // We want to redirect to  https://fbpatel003.github.io/tgdrive/?p=/drive/123
    // so index.html can restore /tgdrive/drive/123 for React Router.
    (function () {
      var origin = window.location.origin;
      var full = window.location.pathname; // e.g. /tgdrive/drive/123
      var base = '/' + full.split('/')[1];  // e.g. /tgdrive

      // Path after the base  e.g. /drive/123
      var rest = full.slice(base.length) || '/';
      var search = window.location.search;
      var hash = window.location.hash;

      // Redirect to base root with ?p= containing the rest
      window.location.replace(
        origin + base + '/?p=' + encodeURIComponent(rest + search + hash)
      );
    })();
  </script>
</head>
</html>
