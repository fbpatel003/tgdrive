<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <script>
    // GitHub Pages SPA redirect — works for any repo name
    // Converts /repo-name/drive/123 → /repo-name/?p=/drive/123
    var seg = window.location.pathname.split('/')[1];
    var repo = seg ? '/' + seg : '';
    var path = window.location.pathname.replace(repo, '') || '/';
    window.location.replace(
      repo + '/?p=' + encodeURIComponent(path + window.location.search + window.location.hash)
    );
  </script>
</head>
</html>
