<!doctype html>
<html lang="en" data-theme="night">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TGDrive</title>
    <script>
      // Restore path from GitHub Pages 404.html redirect
      (function () {
        var p = new URLSearchParams(window.location.search).get('p');
        if (p) {
          var base = window.location.pathname.replace(/\/$/, '');
          window.history.replaceState(null, '', base + p);
        }
      })();
    </script>
    <script>
      (function() {
        var base = document.querySelector('base') ? document.querySelector('base').href : '/';
        // Favicons — injected via JS so they always resolve from the true root
        var root = window.location.origin + '/' + window.location.pathname.split('/')[1];
        function addLink(rel, type, href) {
          var l = document.createElement('link');
          l.rel = rel; if (type) l.type = type; l.href = href;
          document.head.appendChild(l);
        }
        addLink('icon', 'image/x-icon', root + '/favicon.ico');
        addLink('icon', 'image/svg+xml', root + '/favicon.svg');
        addLink('apple-touch-icon', null, root + '/favicon-192.png');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
