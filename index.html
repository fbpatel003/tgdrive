<!doctype html>
<html lang="en" data-theme="night">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="./favicon.ico"/>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg"/>
    <link rel="apple-touch-icon" href="./favicon-192.png"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TGDrive</title>
    <script>
      // Restore path from GitHub Pages 404.html redirect.
      // 404.html stores the original path in ?p=
      // We restore it preserving the base (/tgdrive) so React Router works.
      (function () {
        var p = new URLSearchParams(window.location.search).get('p');
        if (p) {
          // window.location.pathname at this point is e.g. /tgdrive/
          // p is e.g. /drive or /drive/123
          // We need to replaceState to /tgdrive/drive or /tgdrive/drive/123
          var base = window.location.pathname.replace(/\/$/, '');
          var restored = base + p;
          window.history.replaceState(null, '', restored);
        }
      })();
    </script>
